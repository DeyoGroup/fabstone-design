<div id="root"></div>
<script type="text/babel">
const { HomePage, InventoryPage, ProductPage } = window.FabstoneDesignSystem_e3db74;

// Single-file router: intercepts the pages' relative links
// (index.html / live-inventory.html / product.html?item=...) and swaps
// the mounted page instead of navigating.
function parseRoute(href) {
  if (!href) return null;
  if (href.includes('product.html')) {
    const q = href.split('?')[1] || '';
    return { page: 'product', item: new URLSearchParams(q).get('item') };
  }
  if (href.includes('live-inventory.html')) return { page: 'inventory', item: null };
  if (href.includes('index.html')) return { page: 'home', item: null };
  return null;
}

function App() {
  const [route, setRoute] = React.useState({ page: 'home', item: null });
  React.useEffect(() => {
    const onClick = (e) => {
      const a = e.target.closest && e.target.closest('a');
      if (!a) return;
      const href = a.getAttribute('href') || '';
      if (href.startsWith('mailto:') || href.startsWith('tel:') || href.startsWith('http')) return;
      const r = parseRoute(href);
      if (r) {
        e.preventDefault();
        setRoute(r);
        window.scrollTo(0, 0);
      } else if (href === '#' || href === '') {
        e.preventDefault();
      }
    };
    document.addEventListener('click', onClick, true);
    return () => document.removeEventListener('click', onClick, true);
  }, []);
  const assetBase = '../../assets';
  if (route.page === 'inventory') return <InventoryPage assetBase={assetBase} />;
  if (route.page === 'product') return <ProductPage assetBase={assetBase} itemId={route.item} />;
  return <HomePage assetBase={assetBase} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
