<!-- @dsCard group="Colors" viewport="700x190" name="Glass & Overlays" subtitle="Frosted controls on dark imagery; protection gradients" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;font-family:var(--fs-font-body);background:#fff;}
  .row{display:flex;gap:12px;align-items:stretch;padding:16px;}
  .sw{flex:1;display:flex;flex-direction:column;gap:6px;}
  .sw .chip{height:64px;border-radius:10px;border:1px solid rgba(0,0,0,.06);}
  .sw .lbl{font-size:11px;color:#535367;line-height:1.35;}
  .sw .lbl b{display:block;color:#121212;font-weight:700;}
</style><style>
  .stage{display:flex;gap:16px;align-items:center;padding:20px;background:#121212 url('../assets/images/stone-double-charge-640x480.png') center/cover;}
  .glass{height:58px;padding:0 24px;display:inline-flex;align-items:center;border-radius:40px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.10);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);color:#fff;font:500 16px var(--fs-font-display);}
  .badge{display:inline-flex;align-items:center;gap:10px;padding:12px 16px;border-radius:14px;background:rgba(0,0,0,.55);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:#fff;font:600 14px var(--fs-font-display);}
  .badge b{background:#000;padding:4px 8px;border-radius:6px;font-size:12px;}
  .grad{width:160px;height:90px;border-radius:16px;background:linear-gradient(to top, rgba(0,0,0,.85) 0%, rgba(0,0,0,.45) 70%, transparent 100%);border:1px dashed rgba(255,255,255,.3);display:grid;place-items:end center;color:#fff;font:600 12px var(--fs-font-display);padding-bottom:8px;box-sizing:border-box;}
</style></head><body>
<div class="stage">
  <span class="glass">rgba(255,255,255,.10) + blur(24px)</span>
  <span class="badge">Matching Materials <b>98% Match</b></span>
  <div class="grad">protection gradient</div>
</div>
</body></html>
