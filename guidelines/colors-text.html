<!-- @dsCard group="Colors" viewport="700x150" name="Text Colors" subtitle="Body, secondary, muted, on-dark" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;font-family:var(--fs-font-body);background:#fff;}
  .row{display:flex;gap:12px;align-items:stretch;padding:16px;}
  .sw{flex:1;display:flex;flex-direction:column;gap:6px;}
  .sw .chip{height:64px;border-radius:10px;border:1px solid rgba(0,0,0,.06);}
  .sw .lbl{font-size:11px;color:#535367;line-height:1.35;}
  .sw .lbl b{display:block;color:#121212;font-weight:700;}
</style></head><body>
<div class="row">
<div class="sw"><div class="chip" style="background:var(--fs-text)"></div><div class="lbl"><b>Text — headings/body</b>--fs-text · #121212</div></div>
<div class="sw"><div class="chip" style="background:var(--fs-text-soft)"></div><div class="lbl"><b>Slate — secondary</b>--fs-text-soft · #535367</div></div>
<div class="sw"><div class="chip" style="background:var(--fs-muted)"></div><div class="lbl"><b>Muted — ledes on light</b>--fs-muted · #7E7E7E</div></div>
<div class="sw"><div class="chip" style="background:var(--fs-muted-2)"></div><div class="lbl"><b>Muted 2</b>--fs-muted-2 · #9A9A9A</div></div>
<div class="sw"><div class="chip" style="background:var(--fs-on-dark)"></div><div class="lbl"><b>On dark</b>--fs-on-dark · #F2F2F2</div></div>
<div class="sw"><div class="chip" style="background:var(--fs-border)"></div><div class="lbl"><b>Border / text on dark</b>--fs-border · #D2D2D2</div></div>
</div>
</body></html>
