<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;font-family:var(--fs-font-body);background:#fff;}
  .row{display:flex;gap:12px;align-items:stretch;padding:16px;}
  .sw{flex:1;display:flex;flex-direction:column;gap:6px;}
  .sw .chip{height:64px;border-radius:10px;border:1px solid rgba(0,0,0,.06);}
  .sw .lbl{font-size:11px;color:#535367;line-height:1.35;}
  .sw .lbl b{display:block;color:#121212;font-weight:700;}
</style></head><body>
<div class="row">
<div class="sw"><div class="chip" style="background:var(--fs-red)"></div><div class="lbl"><b>Red — primary</b>--fs-red · #991B27</div></div>
<div class="sw"><div class="chip" style="background:var(--fs-red-dark)"></div><div class="lbl"><b>Red dark — hover</b>--fs-red-dark · #80161F</div></div>
<div class="sw"><div class="chip" style="background:var(--fs-red-soft)"></div><div class="lbl"><b>Red soft</b>--fs-red-soft · #AC1F2B</div></div>
<div class="sw"><div class="chip" style="background:var(--fs-copper)"></div><div class="lbl"><b>Copper — eyebrows on dark</b>--fs-copper · #C7844F</div></div>
</div>
</body></html>
