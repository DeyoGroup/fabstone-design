<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;font-family:var(--fs-font-body);background:#fff;}
  .lane{display:flex;align-items:center;gap:40px;padding:24px 32px;}
  .lane--dark{background:var(--fs-dark);}
  .note{font:500 14px/22px var(--fs-font-display);color:#535367;max-width:320px;}
  .lane--dark .note{color:#9A9A9A;}
</style></head><body>
<div class="lane">
  <img src="../assets/images/logo-fabstone.png" alt="Fabstone" style="height:52px;width:auto;">
  <div class="note">assets/images/logo-fabstone.png<br>490×96 · primary — light backgrounds, 48px header / 56px footer</div>
</div>
<div class="lane lane--dark">
  <img src="../assets/images/logo-fabstone-reverse.png" alt="Fabstone reversed" style="height:52px;width:auto;">
  <div class="note">assets/images/logo-fabstone-reverse.png<br>637×125 · reversed — dark (#121212) and red backgrounds</div>
</div>
</body></html>
