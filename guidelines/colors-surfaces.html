<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces" subtitle="White pages, near-black sections, light-grey bands" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;font-family:var(--fs-font-body);background:#fff;}
  .row{display:flex;gap:12px;align-items:stretch;padding:16px;}
  .sw{flex:1;display:flex;flex-direction:column;gap:6px;}
  .sw .chip{height:64px;border-radius:10px;border:1px solid rgba(0,0,0,.06);}
  .sw .lbl{font-size:11px;color:#535367;line-height:1.35;}
  .sw .lbl b{display:block;color:#121212;font-weight:700;}
</style></head><body>
<div class="row">
<div class="sw"><div class="chip" style="background:var(--fs-white)"></div><div class="lbl"><b>White — page</b>--fs-white · #FFFFFF</div></div>
<div class="sw"><div class="chip" style="background:var(--fs-light)"></div><div class="lbl"><b>Light — bands, footer</b>--fs-light · #F5F6F7</div></div>
<div class="sw"><div class="chip" style="background:var(--fs-light-2)"></div><div class="lbl"><b>Light 2</b>--fs-light-2 · #EEEEEE</div></div>
<div class="sw"><div class="chip" style="background:var(--fs-dark)"></div><div class="lbl"><b>Dark — sections</b>--fs-dark · #121212</div></div>
<div class="sw"><div class="chip" style="background:var(--fs-dark-2)"></div><div class="lbl"><b>Dark 2 — media bg</b>--fs-dark-2 · #1A1A1A</div></div>
<div class="sw"><div class="chip" style="background:var(--fs-dark-3)"></div><div class="lbl"><b>Dark 3 — deepest</b>--fs-dark-3 · #0C111F</div></div>
<div class="sw"><div class="chip" style="background:var(--fs-brown)"></div><div class="lbl"><b>Brown — nav text</b>--fs-brown · #2B1E16</div></div>
</div>
</body></html>
