<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;font-family:var(--fs-font-body);background:#fff;}
  .row{display:flex;gap:12px;align-items:stretch;padding:16px;}
  .sw{flex:1;display:flex;flex-direction:column;gap:6px;}
  .sw .chip{height:64px;border-radius:10px;border:1px solid rgba(0,0,0,.06);}
  .sw .lbl{font-size:11px;color:#535367;line-height:1.35;}
  .sw .lbl b{display:block;color:#121212;font-weight:700;}
</style><style>
  .ic{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;padding:20px 28px;}
  .ic figure{margin:0;display:grid;gap:6px;justify-items:center;padding:12px 4px;border:1px solid #F0F0F0;border-radius:12px;color:#121212;}
  .ic img{width:22px;height:22px;}
  .ic figcaption{font:500 10px var(--fs-font-display);color:#7E7E7E;}
</style></head><body>
<div class="ic">
  <figure><img src="../assets/icons/mail.svg" alt="mail"><figcaption>mail</figcaption></figure>\n  <figure><img src="../assets/icons/phone.svg" alt="phone"><figcaption>phone</figcaption></figure>\n  <figure><img src="../assets/icons/heart.svg" alt="heart"><figcaption>heart</figcaption></figure>\n  <figure><img src="../assets/icons/search.svg" alt="search"><figcaption>search</figcaption></figure>\n  <figure><img src="../assets/icons/arrow-diagonal.svg" alt="arrow-diagonal"><figcaption>arrow-diagonal</figcaption></figure>\n  <figure><img src="../assets/icons/chevron-left.svg" alt="chevron-left"><figcaption>chevron-left</figcaption></figure>\n  <figure><img src="../assets/icons/chevron-right.svg" alt="chevron-right"><figcaption>chevron-right</figcaption></figure>\n  <figure><img src="../assets/icons/social-facebook.svg" alt="social-facebook"><figcaption>social-facebook</figcaption></figure>\n  <figure><img src="../assets/icons/social-instagram.svg" alt="social-instagram"><figcaption>social-instagram</figcaption></figure>\n  <figure><img src="../assets/icons/social-linkedin.svg" alt="social-linkedin"><figcaption>social-linkedin</figcaption></figure>\n  <figure><img src="../assets/icons/social-youtube.svg" alt="social-youtube"><figcaption>social-youtube</figcaption></figure>\n  <figure><img src="../assets/icons/search-small.svg" alt="search-small"><figcaption>search-small</figcaption></figure>\n  <figure><img src="../assets/icons/play-circle.svg" alt="play-circle"><figcaption>play-circle</figcaption></figure>
</div>
</body></html>
